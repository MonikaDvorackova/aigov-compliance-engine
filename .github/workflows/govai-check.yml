# GovAI CLI — compliance gate for merge / deploy.
# Fails unless `govai check` exits 0 (outcome VALID only).
#
# Repository Variables (Settings → Secrets and variables → Actions → Variables):
#   GOVAI_AUDIT_BASE_URL — audit / ledger base URL (required to enforce the gate;
#     if unset, the job logs a clear message and exits 0 to avoid breaking forks/CI)
#   RUN_ID — GovAI run UUID (required unless overridden; see Resolve RUN_ID step)
#
# Optional Secret:
#   GOVAI_API_KEY — Bearer token for the audit API
#
# Dynamic RUN_ID from another job in this workflow:
#   1. Add `needs: [your-job]` to job `govai-compliance-gate`.
#   2. Set job env `UPSTREAM_RUN_ID: ${{ needs.your-job.outputs.run_id }}`
#      (replace `your-job` / output name with your workflow).

name: govai-check

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Optional GovAI run UUID (non-empty overrides repository variable RUN_ID)"
        required: false
        type: string
        default: ""
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  govai-compliance-gate:
    runs-on: ubuntu-latest
    env:
      GOVAI_AUDIT_BASE_URL: ${{ vars.GOVAI_AUDIT_BASE_URL }}
      GOVAI_API_KEY: ${{ secrets.GOVAI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install GovAI CLI
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ ! -d python ]; then
            echo "error: missing ./python package directory; cannot install GovAI CLI"
            exit 1
          fi
          python -m pip install -e ./python

      - name: Resolve RUN_ID
        id: run
        env:
          DISPATCH_RUN_ID: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_id || '' }}
          VAR_RUN_ID: ${{ vars.RUN_ID }}
        shell: bash
        run: |
          set -euo pipefail
          UPSTREAM="${UPSTREAM_RUN_ID:-}"
          EFFECTIVE=""
          if [ -n "${UPSTREAM}" ]; then
            EFFECTIVE="${UPSTREAM}"
          elif [ -n "${DISPATCH_RUN_ID}" ]; then
            EFFECTIVE="${DISPATCH_RUN_ID}"
          elif [ -n "${VAR_RUN_ID}" ]; then
            EFFECTIVE="${VAR_RUN_ID}"
          fi
          {
            echo "effective<<__GOVAI_RUN_ID__"
            printf '%s\n' "${EFFECTIVE}"
            echo "__GOVAI_RUN_ID__"
          } >> "${GITHUB_OUTPUT}"

      - name: GovAI check (must be VALID)
        env:
          RUN_ID: ${{ steps.run.outputs.effective }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${GOVAI_AUDIT_BASE_URL:-}" ]; then
            echo "Skipping GovAI compliance gate: GOVAI_AUDIT_BASE_URL is not configured."
            echo "To enable the gate, add repository Variable GOVAI_AUDIT_BASE_URL (Settings → Secrets and variables → Actions → Variables)."
            exit 0
          fi
          if [ -z "${RUN_ID:-}" ]; then
            echo "Skipping GovAI check: RUN_ID is not configured."
            exit 0
          fi
          verdict="$(govai check --run-id "${RUN_ID}")"
          verdict="$(printf '%s' "${verdict}" | tr -d '\r\n' | xargs)"
          if [ "${verdict}" != "VALID" ]; then
            echo "GovAI compliance gate failed: verdict=${verdict}"
            exit 1
          fi
