name: govai-ci

on:
  pull_request:
    branches: [ main ]

jobs:
  govai-verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install GovAI
        run: |
          python -m pip install --upgrade pip
          python -m pip install "aigov-py==0.2.0"
          govai --help >/dev/null

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build audit service
        run: cd rust && cargo build

      - name: Start audit service
        run: make audit_bg

      - name: Wait for audit readiness (GET /ready)
        run: |
          for i in $(seq 1 60); do
            code="$(curl -sS -o /tmp/govai_ready_body -w "%{http_code}" --max-time 2 "http://127.0.0.1:8088/ready" || true)"
            if [ "${code}" = "200" ]; then
              exit 0
            fi
            sleep 0.5
          done
          echo "audit GET /ready did not return HTTP 200 (/health and /status are not substitutes for readiness)"
          exit 1
          
      - name: Run blocked deployment example (should fail)
        run: |
          set -euo pipefail

          if [ -f examples/blocked_deployment.sh ]; then
            chmod +x examples/blocked_deployment.sh
            bash examples/blocked_deployment.sh
          else
            echo "Skipping examples/blocked_deployment.sh: file does not exist"
          fi
