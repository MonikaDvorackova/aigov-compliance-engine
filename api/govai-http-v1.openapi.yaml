      type: object
      required: [ok, error, code, message]
      properties:
        ok:
          type: boolean
          enum: [false]
        error:
          type: string
          description: Machine-readable error category or code.
        code:
          type: string
          description: More specific machine-readable discriminator. Usually equals `error`; for `policy_violation`, this is the policy rule code.
        message:
          type: string
          description: Human-friendly explanation intended for end users.
        policy_version:
          type: string
        details:
          type: string
        metering:
          type: string
          description: "`on` | `off` for plan quotas; `n/a` for per-key request cap only."
