name: "GovAI Compliance Check"
description: "Fails CI unless the GovAI compliance verdict is VALID"

inputs:
  run_id:
    description: "GovAI evidence run id (same as GOVAI_RUN_ID for evidence, check, and export)"
    required: true
  base_url:
    description: "GovAI audit service base URL"
    required: true
  api_key:
    description: "GovAI API key"
    required: true
  project:
    description: "Optional tenant/project context (X-GovAI-Project). Default: github-actions."
    required: false
    default: "github-actions"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install GovAI CLI
      shell: bash
      run: |
        set -euo pipefail
        python -m pip install --upgrade pip
        python -m pip install "aigov-py==0.1.1"
        govai --help >/dev/null

    - name: Run GovAI compliance check
      shell: bash
      env:
        GOVAI_AUDIT_BASE_URL: ${{ inputs.base_url }}
        GOVAI_API_KEY: ${{ inputs.api_key }}
        GOVAI_PROJECT: ${{ inputs.project }}
      run: |
        set -euo pipefail

        if [ -z "${{ inputs.run_id }}" ]; then
          echo "::error::Missing required input: run_id"
          exit 1
        fi

        if [ -z "${GOVAI_AUDIT_BASE_URL:-}" ]; then
          echo "::error::Missing required input: base_url"
          exit 1
        fi

        if [ -z "${GOVAI_API_KEY:-}" ]; then
          echo "::error::Missing required input: api_key (set GOVAI_API_KEY as a GitHub Actions secret and pass it to the action)"
          exit 1
        fi

        echo "Effective GOVAI_RUN_ID=${{ inputs.run_id }}"
        echo "Effective GOVAI_PROJECT=${GOVAI_PROJECT:-}"

        # govai check exits non-zero for intentional non-VALID verdicts (BLOCKED/INVALID).
        # Capture output + exit code so we can report the verdict accurately.
        set +e
        out="$(govai check --run-id "${{ inputs.run_id }}" 2>&1)"
        code="$?"
        set -e

        # Always print the govai check output (verdict or error details).
        printf '%s\n' "${out}"

        if [ "${code}" -eq 0 ] && printf '%s\n' "${out}" | grep -Eq '^VALID$'; then
          echo "GovAI verdict: VALID"
          echo "GovAI compliance gate passed."
          exit 0
        fi

        if printf '%s\n' "${out}" | grep -Eq '^BLOCKED$'; then
          echo "::error::GovAI verdict: BLOCKED"
          echo "::error::Run is not eligible for promotion yet — see missing_evidence and blocked_reasons in the govai check output above."
          exit 1
        fi

        if printf '%s\n' "${out}" | grep -Eq '^INVALID$'; then
          echo "::error::GovAI verdict: INVALID"
          echo "::error::Compliance requirements were not satisfied — details are in the govai check output above."
          exit 1
        fi

        # Otherwise, treat as failure to retrieve a verdict (backend/network/misconfiguration).
        if printf '%s' "${out}" | grep -q "RUN_NOT_FOUND"; then
          echo "::error::GovAI check could not retrieve a compliance verdict."
          echo "::error::Likely causes: wrong run_id, missing evidence run initialization, wrong base_url, invalid API key."
          exit 1
        fi

        echo "::error::GovAI check could not retrieve a compliance verdict."
        echo "::error::Likely causes: wrong run_id, missing evidence run initialization, wrong base_url, invalid API key."
        exit 1
