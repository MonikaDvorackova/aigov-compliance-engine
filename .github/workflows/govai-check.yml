# GovAI CLI — compliance gate for merge / deploy.
# Fails unless `govai check` exits 0 (verdict VALID only).
#
# Required configuration (Settings → Secrets and variables → Actions):
# - Variables:
#   - GOVAI_AUDIT_BASE_URL — audit / ledger base URL (required; without it the gate cannot call the audit API)
# - Secrets:
#   - GOVAI_API_KEY — Bearer token for the audit API (required for the customer-facing gate)
#
# Dynamic GOVAI_RUN_ID from another job in this workflow:
#   1. Add `needs: [your-job]` to job `govai-compliance-gate`.
#   2. Set job env `UPSTREAM_GOVAI_RUN_ID: ${{ needs.your-job.outputs.<govai_run_uuid> }}`
#      (replace job / output name with your workflow).

name: govai-check

on:
  workflow_dispatch:
    inputs:
      govai_run_id:
        description: "Optional GovAI evidence run UUID (non-empty overrides repository variable GOVAI_RUN_ID)"
        required: false
        type: string
        default: ""
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  govai-compliance-gate:
    runs-on: ubuntu-latest
    env:
      GOVAI_AUDIT_BASE_URL: ${{ vars.GOVAI_AUDIT_BASE_URL }}
      GOVAI_API_KEY: ${{ secrets.GOVAI_API_KEY }}
      GOVAI_PROJECT: github-actions
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install GovAI CLI
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install "aigov-py==0.1.1"
          govai --help >/dev/null

      - name: Resolve GOVAI_RUN_ID
        id: run
        env:
          DISPATCH_GOVAI_RUN_ID: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.govai_run_id || '' }}
          VAR_GOVAI_RUN_ID: ${{ vars.GOVAI_RUN_ID }}
        shell: bash
        run: |
          set -euo pipefail
          UPSTREAM="${UPSTREAM_GOVAI_RUN_ID:-}"
          EFFECTIVE=""
          if [ -n "${UPSTREAM}" ]; then
            EFFECTIVE="${UPSTREAM}"
          elif [ -n "${DISPATCH_GOVAI_RUN_ID}" ]; then
            EFFECTIVE="${DISPATCH_GOVAI_RUN_ID}"
          elif [ "${GITHUB_EVENT_NAME:-}" = "workflow_dispatch" ] && [ -n "${VAR_GOVAI_RUN_ID}" ]; then
            # Keep the historical repository-variable fallback only for manual debugging.
            EFFECTIVE="${VAR_GOVAI_RUN_ID}"
          else
            # Self-contained default for PR/push: generate a deterministic per-workflow-run id.
            # (Do NOT use repository variable GOVAI_RUN_ID for PR checks; it can be stale after backend resets.)
            seed="${GITHUB_REPOSITORY:-}:${GITHUB_RUN_ID:-}:${GITHUB_RUN_ATTEMPT:-}:${GITHUB_SHA:-}"
            EFFECTIVE="$(printf '%s' "${seed}" | sha256sum | cut -d' ' -f1)"
          fi
          echo "Effective GOVAI_RUN_ID=${EFFECTIVE}"
          echo "Effective GOVAI_PROJECT=${GOVAI_PROJECT:-}"
          {
            echo "effective<<__GOVAI_RUN_ID__"
            printf '%s\n' "${EFFECTIVE}"
            echo "__GOVAI_RUN_ID__"
          } >> "${GITHUB_OUTPUT}"

      - name: Submit minimal evidence (initialize run)
        env:
          GOVAI_AUDIT_BASE_URL: ${{ vars.GOVAI_AUDIT_BASE_URL }}
          GOVAI_API_KEY: ${{ secrets.GOVAI_API_KEY }}
          GOVAI_RUN_ID: ${{ steps.run.outputs.effective }}
          GOVAI_PROJECT: github-actions
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${GOVAI_AUDIT_BASE_URL:-}" ]; then
            echo "::error::Missing required configuration: GOVAI_AUDIT_BASE_URL"
            echo "::error::Fix: Set repository Variable GOVAI_AUDIT_BASE_URL (Settings → Secrets and variables → Actions → Variables)."
            exit 1
          fi
          if [ -z "${GOVAI_API_KEY:-}" ]; then
            echo "::error::Missing required configuration: GOVAI_API_KEY"
            echo "::error::Fix: Set repository Secret GOVAI_API_KEY (Settings → Secrets and variables → Actions → Secrets)."
            exit 1
          fi
          if [ -z "${GOVAI_RUN_ID:-}" ]; then
            echo "::error::Missing GOVAI_RUN_ID (internal error: run id resolution produced empty string)"
            exit 1
          fi

          echo "Posting minimal evidence to initialize run_id=${GOVAI_RUN_ID}"
          echo "Using X-GovAI-Project=${GOVAI_PROJECT}"
          response="$(mktemp)"
          body="$(
            cat <<'JSON'
          {
            "event_id": "__EVENT_ID__",
            "event_type": "ai_discovery_reported",
            "ts_utc": "__TS_UTC__",
            "actor": "ci",
            "system": "github_actions",
            "run_id": "__RUN_ID__",
            "payload": { "openai": false, "transformers": false, "model_artifacts": false }
          }
          JSON
          )"
          body="${body/__EVENT_ID__/evt_ci_${GOVAI_RUN_ID}_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}}"
          body="${body/__TS_UTC__/$(date -u +%Y-%m-%dT%H:%M:%SZ)}"
          body="${body/__RUN_ID__/${GOVAI_RUN_ID}}"

          echo "Evidence JSON body:"
          printf '%s\n' "${body}"
          status="$(
            curl -sS -o "$response" -w "%{http_code}" \
              -X POST "${GOVAI_AUDIT_BASE_URL}/evidence" \
              -H "Authorization: Bearer ${GOVAI_API_KEY}" \
              -H "X-GovAI-Project: ${GOVAI_PROJECT}" \
              -H "Content-Type: application/json" \
              -d "${body}"
          )"

          echo "Evidence POST response:"
          cat "$response"

          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "::error::Evidence POST failed with HTTP ${status}"
            exit 1
          fi

      - name: GovAI check (must be VALID)
        env:
          GOVAI_AUDIT_BASE_URL: ${{ vars.GOVAI_AUDIT_BASE_URL }}
          GOVAI_API_KEY: ${{ secrets.GOVAI_API_KEY }}
          GOVAI_RUN_ID: ${{ steps.run.outputs.effective }}
          GOVAI_PROJECT: github-actions
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${GOVAI_AUDIT_BASE_URL:-}" ]; then
            echo "::error::Missing required configuration: GOVAI_AUDIT_BASE_URL"
            echo "::error::GovAI compliance gate cannot run because it must call the GovAI audit API to fetch the compliance verdict."
            echo "::error::Fix: Set repository Variable GOVAI_AUDIT_BASE_URL (Settings → Secrets and variables → Actions → Variables)."
            exit 1
          fi
          if [ -z "${GOVAI_API_KEY:-}" ]; then
            echo "::error::Missing required configuration: GOVAI_API_KEY"
            echo "::error::GovAI compliance gate cannot run because it must authenticate to the GovAI audit API to fetch the compliance verdict."
            echo "::error::Fix: Set repository Secret GOVAI_API_KEY (Settings → Secrets and variables → Actions → Secrets)."
            exit 1
          fi
          if [ -z "${GOVAI_RUN_ID:-}" ]; then
            echo "::error::Missing required configuration: GOVAI_RUN_ID"
            echo "::error::GovAI compliance gate cannot run because it needs the evidence run id to query the compliance verdict."
            echo "::error::Fix: Set job env UPSTREAM_GOVAI_RUN_ID from an upstream evidence job output, or pass workflow_dispatch input govai_run_id for manual debugging."
            echo "::error::Note: for pull_request/push, this workflow normally auto-generates a run id; reaching this error usually indicates an internal workflow bug."
            exit 1
          fi
          echo "Effective GOVAI_RUN_ID=${GOVAI_RUN_ID}"
          echo "Effective GOVAI_PROJECT=${GOVAI_PROJECT:-}"
          set +e
          out="$(govai check --run-id "${GOVAI_RUN_ID}" 2>&1)"
          code="$?"
          set -e
          printf '%s\n' "${out}"
          first="$(printf '%s\n' "${out}" | head -n 1 | tr -d '\r\n' | xargs)"
          if [ "${code}" -eq 0 ] && [ "${first}" = "VALID" ]; then
            exit 0
          fi
          echo "::error::GovAI compliance gate failed: verdict=${first:-unknown}"
          exit 1
