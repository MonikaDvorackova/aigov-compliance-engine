          type: string
        team_id:
          type: string
          description: Present when `GOVAI_METERING=on`.
        plan:
          type: string
          description: "`free` | `team` | `growth` | `enterprise` when metering on."
        year_month:
          type: string
          description: "`YYYY-MM` when metering on."
        run:
          type: object
          description: Run counters when metering on.
          additionalProperties: true
        warnings:
          type: array
          items: {}
          description: Advisory strings when metering on.

