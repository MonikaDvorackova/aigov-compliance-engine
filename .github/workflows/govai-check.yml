# GovAI CLI — compliance gate for merge / deploy.
# Fails unless `govai check` exits 0 (verdict VALID only).
#
# Repository Variables (Settings → Secrets and variables → Actions → Variables):
#   GOVAI_AUDIT_BASE_URL — audit / ledger base URL (required to enforce the gate;
#     if unset, the job logs a clear message and exits 0 to avoid breaking forks/CI)
#   GOVAI_RUN_ID — GovAI evidence run UUID (same value for POST /evidence, govai check, export)
#
# Optional Secret:
#   GOVAI_API_KEY — Bearer token for the audit API
#
# Dynamic GOVAI_RUN_ID from another job in this workflow:
#   1. Add `needs: [your-job]` to job `govai-compliance-gate`.
#   2. Set job env `UPSTREAM_GOVAI_RUN_ID: ${{ needs.your-job.outputs.<govai_run_uuid> }}`
#      (replace job / output name with your workflow).

name: govai-check

on:
  workflow_dispatch:
    inputs:
      govai_run_id:
        description: "Optional GovAI evidence run UUID (non-empty overrides repository variable GOVAI_RUN_ID)"
        required: false
        type: string
        default: ""
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  govai-compliance-gate:
    runs-on: ubuntu-latest
    env:
      GOVAI_AUDIT_BASE_URL: ${{ vars.GOVAI_AUDIT_BASE_URL }}
      GOVAI_API_KEY: ${{ secrets.GOVAI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install GovAI CLI
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install "aigov-py==0.1.0"
          govai --help >/dev/null

      - name: Resolve GOVAI_RUN_ID
        id: run
        env:
          DISPATCH_GOVAI_RUN_ID: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.govai_run_id || '' }}
          VAR_GOVAI_RUN_ID: ${{ vars.GOVAI_RUN_ID }}
        shell: bash
        run: |
          set -euo pipefail
          UPSTREAM="${UPSTREAM_GOVAI_RUN_ID:-}"
          EFFECTIVE=""
          if [ -n "${UPSTREAM}" ]; then
            EFFECTIVE="${UPSTREAM}"
          elif [ -n "${DISPATCH_GOVAI_RUN_ID}" ]; then
            EFFECTIVE="${DISPATCH_GOVAI_RUN_ID}"
          elif [ -n "${VAR_GOVAI_RUN_ID}" ]; then
            EFFECTIVE="${VAR_GOVAI_RUN_ID}"
          fi
          {
            echo "effective<<__GOVAI_RUN_ID__"
            printf '%s\n' "${EFFECTIVE}"
            echo "__GOVAI_RUN_ID__"
          } >> "${GITHUB_OUTPUT}"

      - name: GovAI check (must be VALID)
        env:
          GOVAI_RUN_ID: ${{ steps.run.outputs.effective }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${GOVAI_AUDIT_BASE_URL:-}" ]; then
            echo "Skipping GovAI compliance gate: GOVAI_AUDIT_BASE_URL is not configured."
            echo "To enable the gate, add repository Variable GOVAI_AUDIT_BASE_URL (Settings → Secrets and variables → Actions → Variables)."
            exit 0
          fi
          if [ -z "${GOVAI_RUN_ID:-}" ]; then
            echo "Skipping GovAI check: GOVAI_RUN_ID is not configured (repository Variable GOVAI_RUN_ID, workflow_dispatch input govai_run_id, or job env UPSTREAM_GOVAI_RUN_ID)."
            exit 0
          fi
          verdict="$(govai check --run-id "${GOVAI_RUN_ID}")"
          verdict="$(printf '%s' "${verdict}" | tr -d '\r\n' | xargs)"
          if [ "${verdict}" != "VALID" ]; then
            echo "GovAI compliance gate failed: verdict=${verdict}"
            exit 1
          fi
