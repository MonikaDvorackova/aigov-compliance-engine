          type: string
          description: Legacy quota scope when `metering=off`.
        team_id:
          type: string
          description: Team scope when `metering=on`.
        plan:
          type: string
        period_start:
          type: string
        used:
          type: integer
        limit:
          type: integer
        year_month:
          type: integer
        run_id:
          type: string
        event_count:
          type: integer

