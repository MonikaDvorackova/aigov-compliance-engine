name: "GovAI Compliance Check"
description: "Fails CI unless the GovAI compliance verdict is VALID"

inputs:
  run_id:
    description: "GovAI run ID to check"
    required: true
  base_url:
    description: "GovAI audit service base URL"
    required: true
  api_key:
    description: "GovAI API key"
    required: false

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install GovAI CLI
      shell: bash
      run: |
        set -euo pipefail
        python -m pip install --upgrade pip
        # NOTE: `aigov-py` is not published on PyPI. Install from this action's repository contents.
        REPO_ROOT="$(cd "${GITHUB_ACTION_PATH}/../../.." && pwd)"
        if [ ! -d "${REPO_ROOT}/python" ]; then
          echo "::error::GovAI action is missing python/ package directory. This action cannot install the CLI without vendored sources."
          exit 1
        fi
        python -m pip install -e "${REPO_ROOT}/python"
        govai --version

    - name: Run GovAI compliance check
      shell: bash
      env:
        GOVAI_AUDIT_BASE_URL: ${{ inputs.base_url }}
        GOVAI_API_KEY: ${{ inputs.api_key }}
      run: |
        set -euo pipefail

        if [ -z "${{ inputs.run_id }}" ]; then
          echo "::error::Missing required input: run_id"
          exit 1
        fi

        if [ -z "${GOVAI_AUDIT_BASE_URL:-}" ]; then
          echo "::error::Missing required input: base_url"
          exit 1
        fi

        verdict="$(govai check --run-id "${{ inputs.run_id }}")"
        verdict="$(printf '%s' "${verdict}" | tr -d '\r\n' | xargs)"
        if [ "${verdict}" != "VALID" ]; then
          echo "::error::GovAI compliance gate failed: verdict=${verdict}"
          exit 1
        fi
