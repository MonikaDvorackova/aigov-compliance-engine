          type: string
        ts_utc:
          type: string
        actor:
          type: string
        system:
          type: string
        run_id:
          type: string
        environment:
          type: string
          description: Optional on ingest; server may stamp/replace per deployment tier.
        payload:
          description: Event-specific JSON object (`rust/src/policy.rs` enforced types).
